# FontSR + SwinIR-Light config for LR32→HR128 FontSR comparison.
# Compatible with FontSR datasets.build_dataset(data_cfg, split).
# Data spec mirrors FontSR/configs/exp_baseline_lr32.yaml.

data:
  spec:
    font:
      font_path: resources/shufei.ttf
    image:
      hr_size: 128
      lr_size: 32
      hr_font_size: 128
      lr_font_size: 32
      pad_mode: center
    charset:
      char_map_path: resources/meta/shufei.txt
      train_ratio: 0.9
      split_seed: 42
      split_mode: variant
      forced_val_chars:
        - "永"
    stroke:
      return_stroke_vector: false
  level: level1
  dataloader:
    batch_size: 8

model:
  upscale: 4
  in_chans: 1
  img_size: 32
  window_size: 8
  embed_dim: 60
  depths:
    - 6
    - 6
    - 6
    - 6
  num_heads:
    - 6
    - 6
    - 6
    - 6
  mlp_ratio: 2
  upsampler: pixelshuffledirect
  resi_connection: 1conv

train:
  seed: 42
  lr: 2.0e-4
  optim: adam
  # MultiStepLR stepped per-epoch; milestones are EPOCH indices, not iter counts
  scheduler:
    type: multistep
    milestones:
      - 100
      - 150
      - 175
    gamma: 0.5

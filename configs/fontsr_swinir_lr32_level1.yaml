# FontSR LR32 baseline data params + SwinIR model config for controlled comparison
# Data params sourced from /Users/butterflies/Project/FontSR/configs/exp_baseline_lr32.yaml

data:
  font_path: /Users/butterflies/Project/FontSR/resources/shufei.ttf
  char_map_path: /Users/butterflies/Project/FontSR/resources/meta/shufei.txt
  train:
    params:
      hr_size: 128
      lr_size: 32
      hr_font_size: 128
      lr_font_size: 32
      hr_hinting: mac
      pad_mode: center
      split: train
      train_ratio: 0.9
      split_seed: 42
      split_mode: variant
      forced_val_chars:
        - "\u6c38"
  val:
    params:
      hr_size: 128
      lr_size: 32
      hr_font_size: 128
      lr_font_size: 32
      hr_hinting: mac
      pad_mode: center
      split: val
      train_ratio: 0.9
      split_seed: 42
      split_mode: variant
      forced_val_chars:
        - "\u6c38"
  difficulty_profile: level1
  dataloader:
    batch_size: 8

model:
  upscale: 4
  in_chans: 1
  img_size: 32
  window_size: 8
  embed_dim: 60
  depths:
    - 6
    - 6
    - 6
    - 6
  num_heads:
    - 6
    - 6
    - 6
    - 6
  mlp_ratio: 2
  upsampler: pixelshuffledirect
  resi_connection: 1conv
